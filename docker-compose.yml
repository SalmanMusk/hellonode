version: '3.8'

services:
  app:
    image: abdullhannan/hellonode:latest   # your application image
    container_name: hellonode_app
    ports:
      - "3000:3000"                        # map app port to host
    environment:
      - DB_HOST=mysql
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=hellodb
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0                       # official MySQL image
    container_name: hellonode_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: hellodb
    ports:
      - "3306:3306"                        # expose MySQL port
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
